<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Forest Fire Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    color:white;
}

.container-box{
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.title{
    text-align:center;
    margin-bottom:30px;
}

</style>

</head>


<body>

<div class="container mt-5">

<div class="container-box">

<h2 class="title">Forest Fire Weather Index Prediction</h2>

<form method="POST">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Temperature</label>
<input type="number" step="any" class="form-control" name="Temperature" required>
</div>

<div class="col-md-6">
<label class="form-label">Relative Humidity</label>
<input type="number" step="any" class="form-control" name="RH" required>
</div>

<div class="col-md-6">
<label class="form-label">Wind Speed</label>
<input type="number" step="any" class="form-control" name="Ws" required>
</div>

<div class="col-md-6">
<label class="form-label">Rain</label>
<input type="number" step="any" class="form-control" name="Rain" required>
</div>

<div class="col-md-6">
<label class="form-label">FFMC</label>
<input type="number" step="any" class="form-control" name="FFMC" required>
</div>

<div class="col-md-6">
<label class="form-label">DMC</label>
<input type="number" step="any" class="form-control" name="DMC" required>
</div>

<div class="col-md-6">
<label class="form-label">ISI</label>
<input type="number" step="any" class="form-control" name="ISI" required>
</div>

<div class="col-md-6">
<label class="form-label">Classes</label>
<input type="number" step="any" class="form-control" name="Classes" required>
</div>

<div class="col-md-6">
<label class="form-label">Region</label>
<input type="number" step="any" class="form-control" name="Region" required>
</div>

</div>


<div class="text-center mt-4">

<button class="btn btn-success btn-lg">
Predict Fire Risk
</button>

</div>

</form>


{% if results %}

<div class="alert alert-info text-center mt-4">

<h4>Predicted FWI : {{results}}</h4>

</div>

{% endif %}


</div>

</div>

</body>

</html>
